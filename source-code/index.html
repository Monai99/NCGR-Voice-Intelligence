document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\">\n\n    <!-- ================= OPTION 1b ================= -->\n    <div id=\"1b\" style=\"display:flex;flex-direction:column;gap:16px;\">\n\n      <div style=\"width:1180px;border-radius:16px;overflow:hidden;box-shadow:0 30px 70px -26px rgba(16,49,74,.45);border:1px solid #D9E0E3;background:#fff;\">\n        <div style=\"height:42px;background:#EAEFF1;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #DDE4E7;direction:ltr;\">\n          <div style=\"display:flex;gap:7px;\"><span style=\"width:11px;height:11px;border-radius:50%;background:#F0605C;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#F5BE4F;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#61C554;\"><\u002Fspan><\u002Fdiv>\n          <div style=\"margin:0 auto;background:#fff;border:1px solid #DDE4E7;border-radius:8px;height:24px;display:flex;align-items:center;padding:0 16px;font-size:12px;color:#8494A0;font-family:sans-serif;\">nsmm.ncgr.gov.sa<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div dir=\"rtl\" style=\"height:782px;background:#EDF1F2;display:flex;\">\n          <!-- SIDEBAR -->\n          <aside style=\"width:250px;flex-shrink:0;background:linear-gradient(180deg,#15334D 0%,#0E2338 100%);display:flex;flex-direction:column;padding:20px 16px;\">\n            <div style=\"display:flex;align-items:center;gap:12px;padding:6px 8px 20px;\">\n              <img src=\"c585a9fe-bb6f-4655-b0be-b119daa0e6ff\" alt=\"NCGR\" style=\"height: 50px; display: block; flex-shrink: 0; width: 83px\">\n              <div style=\"display:flex;flex-direction:column;gap:2px;\">\n                <span style=\"font-size:13.5px;font-weight:700;color:#fff;line-height:1.25;\">محاضر الاجتماعات<\u002Fspan>\n                <span style=\"font-size:10.5px;color:#7FA0B4;letter-spacing:.03em;\">الوكيل الذكي -NSMM<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:rgba(255,255,255,.08); ) + ' ' + AR_MONTHS[d.getMonth()] + ' ' + toAr(d.getFullYear()); };\n// Extract the meeting title from the spoken/typed transcript (works without the AI service)\nconst _capClass = '[^.،؛:\\\\n)\\\\]»\"]{2,90}';\nconst _cleanTitle = (s) => s.trim()\n  .replace(/^[(«\"“'\\[:\\-\\s]+/, '')\n  .replace(/[)»\"”'\\]\\s]+$/, '')\n  .replace(/^(هو|هي|عن|حول|بشأن|بخصوص|اسم|عنوان|بـ)\\s+/, '')\n  .replace(/\\s+(اليوم|الآن|هنا)$/, '')\n  .trim().split(' ').slice(0, 9).join(' ');\nconst extractTitleExplicit = (t) => {\n  const pats = [\n    new RegExp('(?:عنوان|اسم)\\\\s+(?:الاجتماع|الإجتماع|الأجتماع|اجتماع|إجتماع|الجلسة|الجلسه|اللقاء|المحضر)\\\\s*(?:هو|هي|:|هنا|يكون|سيكون|كالتالي|عن|حول|بخصوص|بشان|بشأن|بـ)?\\\\s*(' + _capClass + ')'),\n    new RegExp('(?:العنوان|عنوانه|الموضوع|موضوعنا|موضوع\\\\s+(?:الاجتماع|الإجتماع|اجتماع))\\\\s*(?:هو|هي|:|هنا|يكون|سيكون|عن|حول|بخصوص|بشان|بشأن)?\\\\s*(' + _capClass + ')'),\n    new RegExp('(?:نسمّي|نسمي|نطلق\\\\s+على)\\\\s+(?:هذا\\\\s+)?(?:الاجتماع|اللقاء)\\\\s*(?:اسم|عنوان|بـ)?\\\\s*(' + _capClass + ')'),\n  ];\n  for (const p of pats) { const m = t.match(p); if (m && m[1] && m[1].trim().length >= 2) return _cleanTitle(m[1]); }\n  return '';\n};\nconst extractTitleLoose = (t) => {\n  const pats = [\n    new RegExp('(?:اجتماعنا|اجتماع)\\\\s+(?:اليوم\\\\s+)?(?:عن|حول|بخصوص|بشأن|لمناقشة)\\\\s+(' + _capClass + ')'),\n    new RegExp('(?:نعقد|نبدأ)\\\\s+(?:هذا\\\\s+)?اجتماع(?:نا)?\\\\s+(?:عن|حول|بخصوص|بشأن|ل)\\\\s*(' + _capClass + ')'),\n  ];\n  for (const p of pats) { const m = t.match(p); if (m && m[1] && m[1].trim().length >= 3) return _cleanTitle(m[1]); }\n  return '';\n};\n\nconst SP = {\n  ahmad:  { name:'أحمد الغامدي',   role:'مدير المشروع',  c:'#159FA3', i:'أغ' },\n  sara:   { name:'سارة القحطاني',  role:'محللة أنظمة',   c:'#6C4A96', i:'سق' },\n  khaled: { name:'خالد العتيبي',   role:'مسؤول تقني',    c:'#5C8A1E', i:'خع' },\n  noura:  { name:'نورة الشهري',    role:'منسقة اللجنة',  c:'#2F89B8', i:'نش' },\n};\nconst PEOPLE = Object.values(SP);\n\n// Per-meeting content so each meeting's transcript / points / decisions / tasks match its own topic\nconst RAW = {\n  m1: {\n    lines: [\n      ['ahmad',  'نبدأ اجتماعنا اليوم بمراجعة خطة إطلاق النظام الموحد للربع الثالث من عام ٢٠٢٦.'],\n      ['sara',   'أنجزنا اختبارات التكامل مع ثلاث جهات حكومية، ووصلنا إلى نسبة نجاح ٩٢٪ في العمليات المالية.'],\n      ['khaled', 'لا تزال هناك مشكلات في زمن الاستجابة عند الضغط العالي، وأقترح تمديد فترة التجربة أسبوعين.'],\n      ['noura',  'أرى أن نخصص فريق دعم فني مخصص لمرافقة الجهات خلال مرحلة الإطلاق الأولى.'],\n      ['ahmad',  'متفقون. سنعتمد تمديد فترة التجربة، ونجهّز فريق الدعم قبل نهاية الشهر الحالي.'],\n      ['sara',   'سأعدّ تقرير اختبارات التكامل النهائي وأشاركه مع اللجنة قبل الخامس عشر من يوليو.'],\n      ['khaled', 'سأعمل على معالجة مشكلات الأداء وتحسين زمن الاستجابة قبل العشرين من يوليو.'],\n      ['noura',  'سأباشر تشكيل فريق الدعم وتدريبه ليكون جاهزًا مع موعد الإطلاق الرسمي.'],\n    ],\n    key: [\n      'مراجعة خطة إطلاق النظام الموحد للربع الثالث من عام ٢٠٢٦.',\n      'اكتمال اختبارات التكامل مع ٣ جهات حكومية بنسبة نجاح ٩٢٪.',\n      'رصد تحديات في زمن الاستجابة تحت الضغط العالي تستوجب المعالجة.',\n    ],\n    dec: [\n      'تمديد فترة التجربة أسبوعين إضافيين قبل الإطلاق الرسمي.',\n      'تخصيص فريق دعم فني مرافق للجهات في مرحلة الإطلاق.',\n      'اعتماد إطلاق النظام الموحد مع نهاية الربع الثالث.',\n    ],\n    act: [\n      ['khaled', 'معالجة مشكلات الأداء وتحسين زمن الاستجابة', 'قبل ٢٠ يوليو'],\n      ['sara',   'إعداد تقرير اختبارات التكامل النهائي',       'قبل ١٥ يوليو'],\n      ['noura',  'تشكيل فريق الدعم وتدريبه استعدادًا للإطلاق',  'قبل ٣٠ يوليو'],\n    ],\n  },\n  m2: {\n    lines: [\n      ['ahmad',  'نبدأ بمراجعة مؤشرات أداء النظام الموحد لشهر يونيو.'],\n      ['sara',   'متوسط زمن الاستجابة انخفض إلى ١٫٤ ثانية، لكن أحمال الذروة تتجاوز ٤ ثوانٍ.'],\n      ['khaled', 'قاعدة البيانات تحتاج إلى فهرسة إضافية وتحسين الاستعلامات الثقيلة.'],\n      ['noura',  'عدد التذاكر الفنية ارتفع ١٨٪ مقارنة بالشهر السابق.'],\n      ['ahmad',  'نعتمد خطة تحسين قاعدة البيانات، ونضع سقفًا لزمن الاستجابة عند ثانيتين.'],\n      ['sara',   'سنراقب المؤشرات أسبوعيًا ونرفع تقريرًا دوريًا للجنة.'],\n    ],\n    key: [\n      'انخفاض متوسط زمن الاستجابة إلى ١٫٤ ثانية خلال يونيو.',\n      'ارتفاع أحمال الذروة وعدد التذاكر الفنية بنسبة ١٨٪.',\n      'الحاجة إلى تحسين فهرسة قاعدة البيانات والاستعلامات الثقيلة.',\n    ],\n    dec: [\n      'اعتماد خطة تحسين قاعدة البيانات وإعادة الفهرسة.',\n      'تحديد سقف لزمن الاستجابة عند ثانيتين كحدٍّ أقصى.',\n    ],\n    act: [\n      ['khaled', 'تنفيذ الفهرسة الإضافية وتحسين الاستعلامات', 'قبل ٥ يوليو'],\n      ['sara',   'إعداد لوحة مراقبة أسبوعية للمؤشرات',        'قبل ٢ يوليو'],\n      ['noura',  'مراجعة أسباب ارتفاع التذاكر الفنية',        'قبل ٨ يوليو'],\n      ['ahmad',  'عرض نتائج التحسين على اللجنة',              'قبل ١٢ يوليو'],\n    ],\n  },\n  m3: {\n    lines: [\n      ['ahmad',  'هدف الورشة اليوم مواءمة واجهات الربط بين خمس جهات حكومية.'],\n      ['sara',   'اعتمدنا معيارًا موحدًا لتبادل البيانات بصيغة JSON عبر واجهات REST.'],\n      ['khaled', 'نحتاج بيئة اختبار مشتركة للتحقق من التكامل قبل الإنتاج.'],\n      ['noura',  'ثلاث جهات جاهزة تقنيًا، وجهتان تحتاجان تحديث أنظمتهما.'],\n      ['sara',   'يجب توحيد رموز الأخطاء وآلية المصادقة بين جميع الأطراف.'],\n      ['ahmad',  'نعتمد المعيار الموحد وننشئ بيئة اختبار مركزية للتكامل.'],\n      ['khaled', 'سنوثّق واجهات الربط في دليل فني موحد للجهات.'],\n      ['noura',  'نحدد جهة تنسيق لكل جهة حكومية لتسريع التكامل.'],\n    ],\n    key: [\n      'اعتماد معيار موحد لتبادل البيانات عبر واجهات REST بصيغة JSON.',\n      'جاهزية ٣ جهات تقنيًا وحاجة جهتين لتحديث أنظمتهما.',\n      'ضرورة توحيد رموز الأخطاء وآلية المصادقة بين الجهات.',\n    ],\n    dec: [\n      'اعتماد المعيار الموحد لتبادل البيانات بين الجهات.',\n      'إنشاء بيئة اختبار مركزية للتكامل قبل الإنتاج.',\n      'توحيد رموز الأخطاء وآلية المصادقة.',\n      'إعداد دليل فني موحد لواجهات الربط.',\n      'تعيين جهة تنسيق لكل جهة حكومية.',\n    ],\n    act: [\n      ['khaled', 'تجهيز بيئة الاختبار المركزية',        'قبل ٣٠ يونيو'],\n      ['sara',   'صياغة مواصفات المعيار الموحد',        'قبل ٢٨ يونيو'],\n      ['noura',  'متابعة تحديث أنظمة الجهتين',          'قبل ٥ يوليو'],\n      ['ahmad',  'إقرار الدليل الفني للواجهات',         'قبل ٨ يوليو'],\n      ['sara',   'توحيد رموز الأخطاء وآلية المصادقة',   'قبل ٢ يوليو'],\n      ['noura',  'تعيين جهات التنسيق لكل جهة',          'قبل ٢٦ يونيو'],\n    ],\n  },\n  m4: {\n    lines: [\n      ['ahmad',  'نراجع اليوم مخصصات التشغيل للنصف الثاني من العام.'],\n      ['noura',  'بند التشغيل استهلك ٦٢٪ من الميزانية المعتمدة حتى الآن.'],\n      ['khaled', 'نحتاج مخصصًا إضافيًا لتراخيص البنية التقنية السحابية.'],\n      ['sara',   'أقترح إعادة توزيع وفورات المشاريع المؤجلة على بنود التشغيل.'],\n      ['ahmad',  'نعتمد إعادة التوزيع ونرفع طلب المخصص الإضافي للتراخيص.'],\n    ],\n    key: [\n      'استهلاك بند التشغيل ٦٢٪ من الميزانية المعتمدة.',\n      'الحاجة إلى مخصص إضافي لتراخيص البنية السحابية.',\n      'توفّر وفورات من مشاريع مؤجلة قابلة لإعادة التوزيع.',\n    ],\n    dec: [\n      'إعادة توزيع وفورات المشاريع المؤجلة على بنود التشغيل.',\n      'رفع طلب مخصص إضافي لتراخيص البنية السحابية.',\n    ],\n    act: [\n      ['noura', 'إعداد جدول إعادة توزيع الميزانية',   'قبل ٢٠ يونيو'],\n      ['ahmad', 'رفع طلب المخصص الإضافي للاعتماد',    'قبل ٢٢ يونيو'],\n    ],\n  },\n  m5: {\n    lines: [\n      ['ahmad',  'نستعرض اليوم خارطة الطريق التقنية مع شركائنا من مزوّدي الحلول.'],\n      ['sara',   'المزوّد الرئيسي يقترح ترقية المنصة إلى الإصدار الجديد خلال الربع القادم.'],\n      ['khaled', 'نحتاج ضمان اتفاقية مستوى خدمة بزمن استجابة لا يتجاوز ٤ ساعات.'],\n      ['noura',  'يجب تضمين بند دعم فني على مدار الساعة للأنظمة الحسّاسة.'],\n      ['sara',   'المزوّد جاهز لتقديم بيئة تجريبية للإصدار الجديد قبل الاعتماد.'],\n      ['ahmad',  'نعتمد جدولة الترقية ونثبّت شروط اتفاقية مستوى الخدمة.'],\n      ['khaled', 'سنراجع تقارير الأداء الشهرية مع المزوّد بشكل دوري.'],\n    ],\n    key: [\n      'اقتراح المزوّد ترقية المنصة إلى الإصدار الجديد في الربع القادم.',\n      'الاتفاق على اتفاقية مستوى خدمة بزمن استجابة ٤ ساعات.',\n      'الحاجة إلى دعم فني على مدار الساعة للأنظمة الحسّاسة.',\n    ],\n    dec: [\n      'اعتماد جدولة ترقية المنصة إلى الإصدار الجديد.',\n      'تثبيت شروط اتفاقية مستوى الخدمة مع المزوّد.',\n      'تضمين دعم فني على مدار الساعة للأنظمة الحسّاسة.',\n      'تفعيل مراجعة دورية شهرية لتقارير الأداء.',\n    ],\n    act: [\n      ['khaled', 'صياغة بنود اتفاقية مستوى الخدمة',        'قبل ١٥ يونيو'],\n      ['sara',   'تجهيز البيئة التجريبية للإصدار الجديد',  'قبل ١٨ يونيو'],\n      ['noura',  'تحديد الأنظمة الحسّاسة ومتطلبات الدعم',  'قبل ١٢ يونيو'],\n      ['ahmad',  'اعتماد جدول الترقية مع المزوّد',         'قبل ٢٠ يونيو'],\n      ['khaled', 'إعداد قالب تقرير الأداء الشهري',         'قبل ٢٢ يونيو'],\n    ],\n  },\n};\n\nconst mkLines = (arr) => arr.map((r, idx) => ({ ...SP[r[0]], text:r[1], key:idx, time: fmt(6 + idx*17) }));\nconst mkDecs  = (arr) => arr.map((t, idx) => ({ n: toAr(idx + 1), t }));\nconst mkActs  = (arr) => arr.map(a => ({ who: SP[a[0]].name, task: a[1], due: a[2], c: SP[a[0]].c, i: SP[a[0]].i }));\n\nconst MEETINGS = [\n  { id:'m1', title:'اجتماع لجنة التحول الرقمي',     date:'٦ يوليو ٢٠٢٦',  dur:'٤٥ دقيقة',    tag:'اليوم', preview:'مراجعة خطة إطلاق النظام الموحد، واعتماد تمديد فترة التجربة، وتخصيص فريق دعم فني للجهات.' },\n  { id:'m2', title:'مراجعة أداء النظام الموحد',      date:'٢٩ يونيو ٢٠٢٦', dur:'٣٢ دقيقة',    tag:'',      preview:'تحليل مؤشرات الأداء الشهرية ومناقشة تحسينات قواعد البيانات وزمن المعالجة.' },\n  { id:'m3', title:'ورشة تكامل الجهات الحكومية',     date:'٢٢ يونيو ٢٠٢٦', dur:'١ ساعة و١٠ د', tag:'',     preview:'مواءمة واجهات الربط البرمجي بين خمس جهات حكومية وتوحيد معايير تبادل البيانات.' },\n  { id:'m4', title:'اجتماع الميزانية التشغيلية',     date:'١٥ يونيو ٢٠٢٦', dur:'٢٨ دقيقة',    tag:'',      preview:'إقرار مخصصات التشغيل للنصف الثاني ومراجعة بنود الإنفاق الرأسمالي.' },\n  { id:'m5', title:'لقاء الشركاء التقنيين',          date:'٨ يونيو ٢٠٢٦',  dur:'٥٥ دقيقة',    tag:'',      preview:'استعراض خارطة الطريق التقنية مع مزوّدي الحلول ومناقشة اتفاقيات مستوى الخدمة والدعم.' },\n];\nMEETINGS.forEach(m => {\n  const d = RAW[m.id];\n  m.lines = mkLines(d.lines);\n  m.key = d.key;\n  m.dec = mkDecs(d.dec);\n  m.act = mkActs(d.act);\n  m.nStr = toAr(m.lines.length);\n  m.decStr = toAr(m.dec.length);\n  m.actStr = toAr(m.act.length);\n});\n\n// Recording flow reflects today's meeting (m1)\nconst TRANSCRIPT = MEETINGS[0].lines;\nconst KEYPOINTS  = MEETINGS[0].key;\nconst DECISIONS  = MEETINGS[0].dec;\nconst ACTIONS    = MEETINGS[0].act;\n\nconst WAVE = Array.from({length:32}, (_, i) => ({ delay: (-(i % 9) * 0.11).toFixed(2) + 's' }));\n\nclass Component extends DCLogic {\n  state = {\n    a: { screen:'home', rec:'idle', elapsed:0, sel:'m1', q:'', muted:false, tab:'summary', capLines:[], interim:'', micErr:null, demoMode:false, sum:null, manualOpen:false, manualText:'', deletedIds:['m1','m2','m3','m4','m5'], pendingDelete:null, userMeetings:[], archived:false, titleEdits:{}, editingId:null, editText:'', clearAsk:false },\n    b: { screen:'home', rec:'idle', elapsed:0, sel:'m1', q:'', muted:false, tab:'summary', capLines:[], interim:'', micErr:null, demoMode:false, sum:null, manualOpen:false, manualText:'', deletedIds:['m1','m2','m3','m4','m5'], pendingDelete:null, userMeetings:[], archived:false, titleEdits:{}, editingId:null, editText:'', clearAsk:false },\n  };\n  _t = {};\n  _asr = {};\n  _stopping = {};\n\n  set(key, patch) { this.setState(s => ({ [key]: { ...s[key], ...patch } })); }\n\n  clear(key) { ['e','l','p'].forEach(x => { clearInterval(this._t[key+x]); clearTimeout(this._t[key+x]); }); }\n\n  startRec(key) {\n    this.clear(key);\n    this.set(key, { rec:'recording', elapsed:0, capLines:[], interim:'', micErr:null, demoMode:false, sum:null, source:'mic', archived:false });\n    this._t[key+'e'] = setInterval(() => this.setState(s => ({ [key]: { ...s[key], elapsed: s[key].elapsed + 1 } })), 1000);\n    this.startASR(key);\n  }\n\n  startASR(key) {\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (!SR) { this.set(key, { micErr: 'unsupported' }); return; }\n    this._stopping[key] = false;\n    let rec;\n    try { rec = new SR(); } catch (_) { this.set(key, { micErr: 'unsupported' }); return; }\n    rec.lang = 'ar-SA'; rec.continuous = true; rec.interimResults = true;\n    rec.onresult = (e) => {\n      if (this.state[key].muted) return;\n      let interim = ''; const finals = [];\n      for (let i = e.resultIndex; i < e.results.length; i++) {\n        const r = e.results[i];\n        const txt = ((r[0] && r[0].transcript) || '').trim();\n        if (r.isFinal) { if (txt) finals.push(txt); } else interim += r[0].transcript;\n      }\n      this.setState(s => ({ [key]: { ...s[key],\n        capLines: finals.length ? [...s[key].capLines, ...finals.map(t => ({ text: t, time: fmt(s[key].elapsed) }))] : s[key].capLines,\n        interim } }));\n    };\n    rec.onerror = (e) => {\n      if (this._stopping[key] || this.state[key].demoMode) return;\n      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') this.set(key, { micErr: 'denied' });\n    };\n    rec.onend = () => {\n      if (this.state[key].rec === 'recording' && !this._stopping[key] && this.state[key].source === 'mic' && !this.state[key].demoMode) { try { rec.start(); } catch (_) {} }\n    };\n    this._asr[key] = rec;\n    try { rec.start(); } catch (_) { this.set(key, { micErr: 'denied' }); }\n  }\n\n  stopASR(key) {\n    this._stopping[key] = true;\n    const rec = this._asr[key];\n    if (rec) { try { rec.stop(); } catch (_) {} }\n  }\n\n  stopRec(key) {\n    this.stopASR(key);\n    this.clear(key);\n    this.set(key, { rec:'processing' });\n    this.summarize(key);\n  }\n\n  submitManual(key) {\n    const raw = (this.state[key].manualText || '').trim();\n    if (!raw) return;\n    const lines = raw.split(/\\n+/).map(t => t.trim()).filter(Boolean).map((t, i) => ({ text: t, time: fmt(i * 15) }));\n    this.stopASR(key);\n    this.clear(key);\n    this.set(key, { capLines: lines, manualOpen: false, micErr: null, demoMode: false, rec: 'processing', elapsed: lines.length * 15, source:'manual', archived:false });\n    this.summarize(key, lines);\n  }\n\n  async summarize(key, overrideLines) {\n    const st = this.state[key];\n    if (st.demoMode && !overrideLines) { this.setState(sst => { const s = sst[key]; const sum = { key: MEETINGS[0].key, dec: MEETINGS[0].dec, act: MEETINGS[0].act, title: 'اجتماع لجنة التحول الرقمي' }; return { [key]: { ...s, sum, rec:'done', ...this._archivePatch(s, sum) } }; }); return; }\n    const capLines = overrideLines || st.capLines;\n    const transcript = capLines.map(l => l.text).join('\\n');\n    const _tc = transcript.replace(/\\s+/g, ' ').trim();\n    const explicitTitle = extractTitleExplicit(_tc);\n    if (!transcript.trim()) { this.set(key, { sum: { key: [], dec: [], act: [], empty: true }, rec:'done' }); return; }\n    try {\n      const prompt = 'أنت وكيل ذكي لإعداد محاضر الاجتماعات. إليك التفريغ الحرفي لاجتماع باللغة العربية. استخرج منه محضرًا منظمًا وردّ بصيغة JSON فقط دون أي نص إضافي بالشكل التالي:\\n{\"title\":\"عنوان مختصر ودقيق للاجتماع\",\"keyPoints\":[\"...\"],\"decisions\":[\"...\"],\"actions\":[{\"who\":\"اسم المكلّف أو غير محدد\",\"task\":\"المهمة\",\"due\":\"الموعد أو غير محدد\"}]}\\nإن ذُكر عنوان أو موضوع الاجتماع صراحةً في التفريغ فاستخدمه كعنوان، وإلا فاستنبط عنوانًا موجزًا (٣ إلى ٦ كلمات) من موضوع النقاش. اجعل كل العناصر بالعربية الفصحى ومختصرة. إن لم تتوفر قرارات أو مهام فاجعل المصفوفة فارغة.\\n\\nالتفريغ:\\n' + transcript;\n      const out = await window.claude.complete({ max_tokens: 1024, messages: [{ role: 'user', content: prompt }] });\n      const mtch = out.match(/\\{[\\s\\S]*\\}/);\n      const data = JSON.parse(mtch ? mtch[0] : out);\n      const palette = ['#159FA3', '#6C4A96', '#5C8A1E', '#2F89B8'];\n      const sum = {\n        title: explicitTitle || (data.title && String(data.title).trim()) || '',\n        key: Array.isArray(data.keyPoints) ? data.keyPoints : [],\n        dec: (Array.isArray(data.decisions) ? data.decisions : []).map((t, i) => ({ n: toAr(i + 1), t })),\n        act: (Array.isArray(data.actions) ? data.actions : []).map((a, i) => ({\n          who: a.who || 'غير محدد', task: a.task || '', due: a.due || 'غير محدد',\n          c: palette[i % palette.length], i: ((a.who || 'م').trim().charAt(0)) || 'م' })),\n      };\n      this.setState(sst => { const s = sst[key]; return { [key]: { ...s, sum, rec:'done', ...this._archivePatch(s, sum) } }; });\n    } catch (err) {\n      this.setState(sst => { const s = sst[key]; const sum = { title: explicitTitle, key: capLines.map(l => l.text), dec: [], act: [], raw: true }; return { [key]: { ...s, sum, rec:'done', ...this._archivePatch(s, sum) } }; });\n    }\n  }\n\n  runDemo(key) {\n    this.stopASR(key);\n    this.clear(key);\n    this.set(key, { rec:'recording', elapsed:0, capLines:[], interim:'', micErr:null, demoMode:true, sum:null, source:'demo', manualOpen:false, archived:false });\n    this._t[key+'e'] = setInterval(() => this.setState(s => ({ [key]: { ...s[key], elapsed: s[key].elapsed + 1 } })), 1000);\n    this._t[key+'l'] = setInterval(() => this.setState(s => {\n      if (s[key].capLines.length >= TRANSCRIPT.length) return {};\n      const next = TRANSCRIPT[s[key].capLines.length];\n      return { [key]: { ...s[key], capLines: [...s[key].capLines, { text: next.text, time: fmt(s[key].elapsed) }] } };\n    }), 1700);\n  }\n\n  exportMinutes(key) {\n    const st = this.state[key];\n    const sum = st.sum || { key: [], dec: [], act: [] };\n    let logo = '';\n    const logoImg = document.querySelector('img[alt=\"NCGR\"]');\n    if (logoImg) {\n      try {\n        const cv = document.createElement('canvas');\n        cv.width = logoImg.naturalWidth || 400; cv.height = logoImg.naturalHeight || 250;\n        cv.getContext('2d').drawImage(logoImg, 0, 0);\n        logo = cv.toDataURL('image/png');\n      } catch (_) { logo = logoImg.src || ''; }\n    }\n    const days = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];\n    const endT = new Date();\n    const startT = new Date(endT.getTime() - (st.elapsed || 0) * 1000);\n    const p2 = (n) => String(n).padStart(2, '0');\n    const hhmm = (d) => toAr(p2(d.getHours()) + ':' + p2(d.getMinutes()));\n    const title = st.demoMode ? 'اجتماع لجنة التحول الرقمي' : ((sum && sum.title) || 'محضر الاجتماع الجديد');\n    const dayName = st.demoMode ? 'الإثنين' : days[endT.getDay()];\n    const dateNum = st.demoMode ? '٢٠٢٦/٠٧/٠٦' : toAr(endT.getFullYear() + '/' + p2(endT.getMonth() + 1) + '/' + p2(endT.getDate()));\n    const timeRange = st.demoMode ? (toAr('10:00') + ' – ' + toAr('10:45')) : (hhmm(startT) + ' – ' + hhmm(endT));\n    const esc = (x) => String(x == null ? '' : x).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\n    const ENTITY = 'المركز الوطني لنظم الموارد الحكومية';\n    const attendees = st.demoMode ? PEOPLE.map(p => ({ name: p.name, role: p.role, entity: ENTITY })) : [];\n    const attRows = (attendees.length ? attendees : [{ name:'—', role:'—', entity: ENTITY }])\n      .map((a, i) => `<tr><td class=\"idx\">${toAr(i + 1)}<\u002Ftd><td>${esc(a.name)}<\u002Ftd><td>${esc(a.role)}<\u002Ftd><td>${esc(a.entity)}<\u002Ftd><\u002Ftr>`).join('');\n    const points = sum.key.concat(sum.dec.map(d => d.t));\n    const ptRows = points.length ? points.map((p, i) => `<tr><td class=\"idx\">${toAr(i + 1)}<\u002Ftd><td>${esc(p)}<\u002Ftd><\u002Ftr>`).join('') : `<tr><td colspan=\"2\" class=\"empty\">لا يوجد<\u002Ftd><\u002Ftr>`;\n    const actRows = sum.act.length ? sum.act.map((a, i) => `<tr><td class=\"idx\">${toAr(i + 1)}<\u002Ftd><td>${esc(a.task)}<\u002Ftd><td>${esc(a.who)}<\u002Ftd><td>${esc(a.due)}<\u002Ftd><\u002Ftr>`).join('') : `<tr><td colspan=\"4\" class=\"empty\">لا يوجد<\u002Ftd><\u002Ftr>`;\n    const html = `<!doctype html><html lang=\"ar\" dir=\"rtl\"><head><meta charset=\"utf-8\"><title>محضر اجتماع — ${esc(title)}<\u002Ftitle>\n<link href=\"https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap\" rel=\"stylesheet\">\n<style>\n@page{size:A4;margin:14mm 14mm}\n*{box-sizing:border-box}\nbody{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;color:#004975;margin:0;background:#fff;line-height:1.7}\n.top{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:4px}\n.top .t{font-size:26px;font-weight:700;color:#004975}\n.top .t small{display:block;font-size:12px;font-weight:500;color:#6A8494;margin-top:5px}\n.top img{height:60px}\n.sec{display:flex;align-items:center;justify-content:space-between;background:#004975;color:#fff;padding:9px 16px;border-radius:6px;font-size:15px;font-weight:700;margin:16px 0 0}\n.sec .en{font-weight:500;font-size:12.5px;opacity:.85}\ntable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;border:2px solid #84E290}\nth,td{border:1px solid #A9DFB2;padding:8px 10px;text-align:right;vertical-align:middle}\nth{background:#00B0F0;color:#fff;font-weight:600;font-size:12.5px}\nth small{display:block;font-weight:400;font-size:10.5px;opacity:.9}\ntd{background:#fff;color:#004975}\ntd.idx,th.idx{width:36px;text-align:center;color:#00B0F0;font-weight:700}\nth.idx{color:#fff}\ntd.empty{text-align:center;color:#93A2AA}\n.foot{margin-top:26px;text-align:center;color:#004975;font-weight:700;font-size:16px}\n.foot small{display:block;font-weight:400;font-size:11px;color:#93A2AA;margin-top:6px}\n<\u002Fstyle><\u002Fhead><body>\n<div class=\"top\"><div class=\"t\">محضر اجتماع<small>Meeting Minutes · المركز الوطني لنظم الموارد الحكومية<\u002Fsmall><\u002Fdiv>${logo ? '<img src=\"' + logo + '\" alt=\"NCGR\">' : ''}<\u002Fdiv>\n\n<div class=\"sec\"><span>معلومات الاجتماع<\u002Fspan><span class=\"en\">Meeting
